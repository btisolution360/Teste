<!DOCTYPE html>
<style>
    .pdf-wrapper {
      width: 100%;
      height: 80vh;
      border: none;
    }
  
    .mobile-fallback {
      display: none;
      padding: 20px;
      text-align: center;
      background: #eef2f5;
      border-radius: 8px;
    }
  
    /* Em telas menores que 768px, podemos avisar ou ajustar */
    @media (max-width: 768px) {
      .pdf-wrapper {
        height: 60vh;
      }
      .mobile-fallback {
        display: block;
        margin-bottom: 10px;
      }
    }
  </style>
  
  <div class="mobile-fallback">
    <p>Está no celular? Para uma melhor leitura:</p>
    <a href=".pdf" target="_blank" style="display:inline-block; margin-top:8px; padding:10px 16px; background:#0066cc; color:#fff; text-decoration:none; border-radius:4px;">Abrir PDF em Tela Cheia</a>
  </div>
  
  <object data="Portifolio.pdf" type="application/pdf" class="pdf-wrapper">
    <p>Seu navegador não suporta visualização de PDF. <a href="SEU_ARQUIVO.pdf">Clique aqui para baixar</a>.</p>
  </object>
